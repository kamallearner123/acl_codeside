<div class="bg-white rounded-2xl p-6 shadow-premium hover:shadow-premium-hover transition-all duration-300 transform hover:-translate-y-1 border border-gray-50 h-full flex flex-col">
    <h3 class="text-xl font-bold text-brand-navy mb-2">{{ tool.name }}</h3>
    <p class="text-brand-textSecondary text-sm mb-6">{{ tool.description }}</p>
    
    {% if tool.requirements %}
    <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
        <span class="text-[10px] font-bold text-brand-coral uppercase tracking-widest block mb-1">System Requirements</span>
        <p class="text-sm text-gray-700 font-medium">{{ tool.requirements }}</p>
    </div>
    {% endif %}

    {% if tool.samples %}
    <div class="mb-6 flex-grow">
        <span class="text-[10px] font-bold text-brand-coral uppercase tracking-widest block mb-1">Code / CLI Samples</span>
        <div class="bg-[#0f172a] p-4 rounded-lg shadow-inner overflow-x-auto border border-gray-800">
            <pre class="text-xs text-[#38bdf8] font-mono whitespace-pre-wrap leading-relaxed">{{ tool.samples }}</pre>
        </div>
    </div>
    {% endif %}
    
    <div class="mt-auto flex items-center gap-3 pt-4 border-t border-gray-50">
        {% if tool.github_url %}
        <a href="{{ tool.github_url }}" target="_blank" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-gray-50 hover:bg-gray-100 text-brand-navy font-bold text-sm rounded-xl border border-gray-200 transition-colors">
            <i class="fab fa-github"></i> Source
        </a>
        {% endif %}
        
        {% if tool.download_url %}
        <a href="{{ tool.download_url }}" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-brand-navy hover:bg-opacity-90 text-white font-bold text-sm rounded-xl transition-colors shadow-md hover:shadow-lg">
            <i class="fas fa-download"></i> Download
        </a>
        {% endif %}
    </div>
</div>
